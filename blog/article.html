<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Shaolin Bénin | Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --rouge: #E63946; --or: #FFD700; --gris-fonce: #2B2D42; --gris-clair: #F8F9FA; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris-clair); }

        .header {
            background: linear-gradient(135deg, var(--gris-fonce) 0%, #1a1a2e 100%);
            color: white;
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .logo a { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: white; }
        .logo h1 { font-size: 1.3rem; }
        .logo span { color: var(--or); }
        .logo-icon { border-radius: 50%; height: 50px; width: 50px; object-fit: cover; }
        .nav-menu { display: flex; list-style: none; gap: 2rem; }
        .nav-menu a { color: white; text-decoration: none; }

        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 22px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }
        .menu-toggle span {
            display: block;
            width: 100%;
            height: 3px;
            background: var(--or);
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        .menu-toggle.open span:nth-child(1) { transform: translateY(9.5px) rotate(45deg); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; }
        .menu-toggle.open span:nth-child(3) { transform: translateY(-9.5px) rotate(-45deg); }

        .article-page { max-width: 900px; margin: 120px auto 0; padding: 0 1rem 3rem; }
        .article-header { text-align: center; margin-bottom: 2rem; }
        .article-header .category { display: inline-block; background: var(--rouge); color: white; padding: 0.3rem 1rem; border-radius: 25px; font-size: 0.8rem; margin-bottom: 1rem; }
        .article-header h1 { font-size: 2rem; color: var(--gris-fonce); margin-bottom: 1rem; }
        .article-meta { color: #888; font-size: 0.9rem; display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
        .article-content-full { line-height: 1.8; color: #444; font-size: 1rem; }
        .article-content-full p { margin-bottom: 1rem; }
        .back-link { display: inline-block; margin-top: 2rem; color: var(--rouge); text-decoration: none; }
        .footer { background: #1a1a1a; color: white; text-align: center; padding: 2rem; margin-top: 2rem; }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .nav-menu {
                position: fixed;
                top: 80px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 80px);
                background: var(--gris-fonce);
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition: left 0.3s ease;
                z-index: 999;
                gap: 2rem;
            }
            .nav-menu.menu-open { left: 0 !important; }
            .logo h1 { font-size: 1rem; }
            .article-header h1 { font-size: 1.5rem; }
        }
        .loading { text-align: center; padding: 3rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <div class="logo">
                <a href="../index.html">
                    <img src="../medias/logo cssb.jpg" alt="logo" class="logo-icon">
                    <h1>Super <span>Shaolin</span> Bénin</h1>
                </a>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="../a-propos.html">À propos</a></li>
                <li><a href="../contact.html">Contact</a></li>
                <li><a href="../adhesion.html">Adhésion</a></li>
                <li><a href="index.html">Actualités</a></li>
            </ul>
        </div>
    </header>

    <div class="article-page" id="articlePage">
        <div id="articleContent"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour aux actualités</a>
    </div>

    <footer class="footer">
        <p>© 2026 Super Shaolin du Bénin</p>
    </footer>

    <!-- MENU : script isolé -->
    <script>
        (function() {
            var btn = document.getElementById('menuToggle');
            var nav = document.getElementById('navMenu');

            if (btn && nav) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var open = nav.classList.toggle('menu-open');
                    btn.classList.toggle('open', open);
                });

                nav.querySelectorAll('a').forEach(function(a) {
                    a.addEventListener('click', function() {
                        nav.classList.remove('menu-open');
                        btn.classList.remove('open');
                    });
                });

                document.addEventListener('click', function(e) {
                    if (!nav.contains(e.target) && !btn.contains(e.target)) {
                        nav.classList.remove('menu-open');
                        btn.classList.remove('open');
                    }
                });
            }
        })();
    </script>

    <!-- SUPABASE : contenu de l'article -->
    <script>
        const SUPABASE_URL = 'https://pngyburrixrfaxwbqsny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_cgdu_2dYJcR7WLzYWQ4-bg_jx8uotBa';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = parseInt(urlParams.get('id'));
        
        async function loadArticle() {
            const { data: article, error } = await supabase.from('articles').select('*').eq('id', articleId).single();
            if (error || !article) {
                document.getElementById('articleContent').innerHTML = `<div style="text-align:center; padding:3rem;"><h2>Article non trouvé</h2><a href="index.html">← Retour</a></div>`;
                return;
            }
            document.getElementById('articleContent').innerHTML = `
                <div class="article-header">
                    <span class="category">${article.category}</span>
                    <h1>${article.title}</h1>
                    <div class="article-meta">
                        <span>📅 ${new Date(article.date).toLocaleDateString('fr-FR')}</span>
                        <span>👤 Par ${article.author}</span>
                        <span>👁️ ${article.views || 0} vues</span>
                    </div>
                </div>
                <div class="article-content-full">
                    ${article.content.split('\n').map(p => `<p>${p}</p>`).join('')}
                </div>
            `;
        }
        
        if (articleId) loadArticle();
        else window.location.href = 'index.html';
    </script>
</body>
</html>
