<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Shaolin Bénin | Administration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .login-box button {
            background: #E63946;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .error { color: red; margin-top: 10px; }
        .admin-panel { display: none; max-width: 1000px; margin: 100px auto; background: white; padding: 2rem; border-radius: 10px; }
        .btn-add { background: #E63946; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .article-form { display: none; background: #f9f9f9; padding: 1rem; margin-bottom: 20px; border-radius: 5px; }
        .article-form input, .article-form select, .article-form textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .upload-area { border: 2px dashed #FFD700; padding: 1rem; text-align: center; cursor: pointer; margin-bottom: 10px; background: #fff9e6; }
        .image-preview { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .preview { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; border: 2px solid #FFD700; }
        .btn-submit { background: #E63946; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        .admin-article-item { background: #f9f9f9; padding: 1rem; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        .btn-edit { color: #FFD700; background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-right: 10px; }
        .btn-delete { color: #E63946; background: none; border: none; cursor: pointer; font-size: 1.2rem; }
        .logout-btn { background: #ddd; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .header { background: #2B2D42; color: white; padding: 1rem; position: fixed; top: 0; width: 100%; }
        .logo a { color: white; text-decoration: none; }
        .footer { background: #1a1a1a; color: white; text-align: center; padding: 1rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="../index.html">Super Shaolin Bénin</a>
        </div>
    </header>

    <div id="loginSection">
        <div class="login-box">
            <h2>Administration</h2>
            <p>Accès réservé au club</p>
            <input type="password" id="adminPassword" placeholder="Mot de passe">
            <button id="loginBtn">Se connecter</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h2>Espace administration</h2>
            <button id="logoutBtn" class="logout-btn">Déconnexion</button>
        </div>
        
        <button id="showAddFormBtn" class="btn-add">+ Nouvel article</button>
        
        <div id="articleForm" class="article-form">
            <h3 id="formTitle">Publier un article</h3>
            <input type="text" id="articleTitle" placeholder="Titre">
            <select id="articleCategory">
                <option value="Festival">Festival</option>
                <option value="Championnat">Championnat</option>
                <option value="Stage">Stage</option>
                <option value="demonstration">Démonstrations</option>
                <option value="Info">Inforations</option>
                <option value="Entrainement">Entraînement</option>
                <option value="Evenement">Événement</option>
                <option value="Autre">Autre</option>
            </select>
            
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt"></i> Cliquez pour ajouter des photos
                <input type="file" id="imageInput" multiple accept="image/*" style="display:none">
            </div>
            <div id="imagePreview" class="image-preview"></div>
            
            <textarea id="articleExcerpt" placeholder="Résumé" rows="3"></textarea>
            <textarea id="articleContent" placeholder="Contenu" rows="6"></textarea>
            <input type="hidden" id="editArticleId">
            <button id="saveArticleBtn" class="btn-submit">Publier</button>
            <button id="cancelFormBtn" style="margin-top:10px; background:#ddd; border:none; padding:10px; border-radius:5px; cursor:pointer;">Annuler</button>
        </div>
        
        <h3>Articles publiés</h3>
        <div id="articlesList">Chargement...</div>
    </div>

    <footer class="footer">
        <p>© 2026 Super Shaolin du Bénin</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://pngyburrixrfaxwbqsny.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_cgdu_2dYJcR7WLzYWQ4-bg_jx8uotBa';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_PASSWORD = 'Shaolin2025';
        
        let currentImages = [];
        
        // Vérifier si déjà connecté
        if (localStorage.getItem('admin_logged_in') === 'true') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadArticles();
        }
        
        // Bouton connexion
        document.getElementById('loginBtn').addEventListener('click', function() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadArticles();
            } else {
                document.getElementById('loginError').innerHTML = 'Mot de passe incorrect';
            }
        });
        
        // Déconnexion
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('admin_logged_in');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        });
        
        async function loadArticles() {
            const { data } = await supabase.from('articles').select('*').order('date', { ascending: false });
            const container = document.getElementById('articlesList');
            if (!data || data.length === 0) {
                container.innerHTML = '<p>Aucun article</p>';
                return;
            }
            container.innerHTML = data.map(article => `
                <div class="admin-article-item">
                    <div>
                        <strong>${article.title}</strong><br>
                        <small>${article.category} - ${new Date(article.date).toLocaleDateString()}</small>
                        ${article.images && article.images[0] ? `<div><img src="${article.images[0]}" style="width:50px; height:50px; object-fit:cover; margin-top:5px;"></div>` : ''}
                    </div>
                    <div>
                        <button class="btn-edit" onclick="editArticle(${article.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteArticle(${article.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }
        
        window.editArticle = async function(id) {
            const { data: article } = await supabase.from('articles').select('*').eq('id', id).single();
            if (article) {
                document.getElementById('editArticleId').value = article.id;
                document.getElementById('articleTitle').value = article.title;
                document.getElementById('articleCategory').value = article.category;
                document.getElementById('articleExcerpt').value = article.excerpt;
                document.getElementById('articleContent').value = article.content;
                currentImages = article.images || [];
                updatePreview();
                document.getElementById('formTitle').innerHTML = 'Modifier l\'article';
                document.getElementById('saveArticleBtn').innerHTML = 'Mettre à jour';
                document.getElementById('articleForm').style.display = 'block';
            }
        };
        
        window.deleteArticle = async function(id) {
            if (confirm('Supprimer cet article ?')) {
                await supabase.from('articles').delete().eq('id', id);
                loadArticles();
                alert('Article supprimé');
            }
        };
        
        // Upload images
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });
        
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        currentImages.push(event.target.result);
                        updatePreview();
                    };
                    reader.readAsDataURL(file);
                }
            });
        });
        
        function updatePreview() {
            const container = document.getElementById('imagePreview');
            if (currentImages.length === 0) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = currentImages.map((img, i) => `
                <div style="position:relative;">
                    <img src="${img}" class="preview">
                    <span onclick="removeImage(${i})" style="position:absolute; top:-8px; right:-8px; background:red; color:white; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px;">×</span>
                </div>
            `).join('');
        }
        
        window.removeImage = function(index) {
            currentImages.splice(index, 1);
            updatePreview();
        };
        
        function resetForm() {
            document.getElementById('editArticleId').value = '';
            document.getElementById('articleTitle').value = '';
            document.getElementById('articleCategory').value = 'Festival';
            document.getElementById('articleExcerpt').value = '';
            document.getElementById('articleContent').value = '';
            currentImages = [];
            updatePreview();
            document.getElementById('formTitle').innerHTML = 'Publier un article';
            document.getElementById('saveArticleBtn').innerHTML = 'Publier';
            document.getElementById('articleForm').style.display = 'none';
        }
        
        document.getElementById('showAddFormBtn').addEventListener('click', () => {
            resetForm();
            document.getElementById('articleForm').style.display = 'block';
        });
        
        document.getElementById('cancelFormBtn').addEventListener('click', resetForm);
        
        document.getElementById('saveArticleBtn').addEventListener('click', async () => {
            const id = document.getElementById('editArticleId').value;
            const title = document.getElementById('articleTitle').value.trim();
            const category = document.getElementById('articleCategory').value;
            const excerpt = document.getElementById('articleExcerpt').value.trim();
            const content = document.getElementById('articleContent').value.trim();
            
            if (!title || !excerpt || !content) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            if (id) {
                await supabase.from('articles').update({ title, category, excerpt, content, images: currentImages }).eq('id', id);
                alert('Article modifié');
            } else {
                await supabase.from('articles').insert([{ title, category, excerpt, content, images: currentImages, date: new Date().toISOString() }]);
                alert('Article publié');
            }
            resetForm();
            loadArticles();
        });
    </script>
</body>
</html>
